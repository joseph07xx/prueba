<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuestra Historia</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 15px; width: 320px; text-align: center; background: #fdf7fc; }
        .media-container { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 10px; margin-bottom: 10px; }
        img { max-width: 100%; height: auto; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { background: #6b3fa0; color: white; padding: 10px 20px; text-decoration: none; border-radius: 20px; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="galeria-prueba"></div>

    <script>
        // Cambiamos a objetos más claros
        const contenido = [
            {
                titulo: "Nuestro Video",
                tipo: "video",
                url: "https://youtube.com/shorts/6K2pEAAkTXM"

            },
            {
                titulo: "Nuestro Recuerdo",
                tipo: "imagen",
                url: "https://lh3.googleusercontent.com/d/1E78G7zVFpYkWX27AfGA9S6WXWVJASeEV"
            }
        ];

        const galeria = document.getElementById('galeria-prueba');

        contenido.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';

            const media = item.tipo === 'video'
                ? `<iframe src="${item.url}" allowfullscreen></iframe>`
                : `<img src="${item.url}" alt="${item.titulo}">`;

            // Para la imagen ponemos botón de descarga directa, para el video ponemos link a YouTube
            const boton = item.tipo === 'imagen'
                ? `<a href="${item.url}" download class="btn">Descargar Foto</a>`
                : `<a href="https://youtube.com/shorts/6K2pEAAkTXM" target="_blank" class="btn">Ver en YouTube</a>`;

            card.innerHTML = `
                <h3>${item.titulo}</h3>
                <div class="media-container">${media}</div>
                ${boton}
            `;
            galeria.appendChild(card);
        });
    </script>
</body>
</html>
